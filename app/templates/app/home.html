<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parfumerie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #2f6548;
            --light: #f4f4f4;
            --border: #1994ff;
            --text: #141414;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Montserrat", sans-serif;
            background: #f0f0f0;
            color: var(--text);
            min-height: 100vh;
        }

        .page {
            width: 100%;
            min-height: 100vh;
            background: #fff;
        }

        .top-bar {
            background: var(--green);
            color: #fff;
            display: grid;
            grid-template-columns: 220px 1fr 330px;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            font-size: 16px;
        }

        .shop-text {
            text-align: center;
            line-height: 1.3;
        }

        .search {
            position: relative;
        }

        .search input {
            width: 100%;
            border: none;
            border-radius: 24px;
            padding: 12px 40px 12px 24px;
            background: #e9e9e9;
            font-size: 16px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .top-links {
            display: flex;
            justify-content: flex-end;
            gap: 28px;
            align-items: center;
            font-size: 18px;
        }

        .top-links span {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            white-space: nowrap;
        }

        .menu {
            display: grid;
            grid-template-columns: 220px 1fr 160px;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid #e6e6e6;
            background: #fff;
        }

        .brand {
            font-family: "Playfair Display", serif;
            color: var(--green);
            font-size: 44px;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .menu-links {
            display: flex;
            justify-content: center;
            gap: 56px;
            list-style: none;
            font-size: 34px;
            font-weight: 500;
        }

        .menu-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 38px;
        }

        .hero {
            position: relative;
            height: calc(100vh - 154px);
            min-height: 610px;
            border: 2px solid var(--border);
            background:
                linear-gradient(to right, rgba(19, 15, 12, 0.55), rgba(26, 28, 32, 0.63)),
                url("https://images.unsplash.com/photo-1615634262417-d5f326344f5f?auto=format&fit=crop&w=1600&q=80")
                    center/cover no-repeat;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -52%);
            width: 56%;
            border-radius: 34px;
            background: rgba(225, 225, 225, 0.2);
            text-align: center;
            padding: 120px 20px 110px;
            backdrop-filter: blur(2px);
        }

        .hero-title {
            font-size: 54px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .hero-subtitle {
            font-size: 36px;
            margin-bottom: 28px;
        }

        .hero-btn {
            display: inline-block;
            background: rgba(72, 72, 72, 0.64);
            color: #fff;
            font-size: 40px;
            text-decoration: none;
            padding: 16px 42px;
            min-width: 330px;
        }

        .floating-icons {
            position: absolute;
            right: 18px;
            bottom: 90px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .bubble {
            width: 58px;
            height: 58px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 28px;
        }

        .bubble.messenger {
            background: radial-gradient(circle at 30% 30%, #ff7ecb, #4564ff);
        }

        .bubble.chat {
            background: #57d6cc;
            border-radius: 12px;
            font-size: 30px;
        }

        @media (max-width: 1200px) {
            .page {
                max-width: 100%;
            }

            .top-bar {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .menu {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .menu-links {
                flex-wrap: wrap;
                gap: 18px;
                font-size: 26px;
            }

            .brand {
                text-align: center;
                font-size: 38px;
            }

            .hero {
                min-height: 500px;
            }

            .hero-overlay {
                width: 86%;
                padding: 60px 12px;
            }

            .hero-title {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 24px;
            }

            .hero-btn {
                font-size: 24px;
                min-width: 220px;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <header class="top-bar">
        <div class="shop-text">Cửa hàng nước hoa chính hãng<br>Cần Thơ</div>
        <label class="search" for="search">
            <input id="search" type="text" placeholder="Tìm kiếm...">
            <span class="search-icon">⌕</span>
        </label>
        <div class="top-links">
            <span>ℹ️ Giới thiệu</span>
            <span>🚚 Tra cứu đơn hàng</span>
        </div>
    </header>

    <nav class="menu">
        <div class="brand">PARFUMERIE</div>
        <ul class="menu-links">
            <li>Trang chủ</li>
            <li>Nước hoa</li>
            <li>Bài viết</li>
            <li>Liên hệ</li>
        </ul>
        <div class="menu-icons">
            <span>🛒</span>
            <span>👤</span>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-overlay">
            <h1 class="hero-title">FARRFUMERIE</h1>
            <p class="hero-subtitle">Khám phá thế giới nước hoa đa dạng</p>
            <a href="#" class="hero-btn">Khám phá ngay →</a>
        </div>
        <div class="floating-icons">
            <div class="bubble messenger">⌁</div>
            <div class="bubble chat">💬</div>
        </div>
    </section>
</div>
</body>
</html>
